<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White background circle -->
  <circle cx="32" cy="32" r="32" fill="#ffffff"/>

  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A227" stroke-width="2.5"/>

  <!-- Inner navy ring -->
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#003F7A" stroke-width="1.5"/>

  <!-- Gold 4-point star / compass (top) -->
  <polygon points="32,4 33.8,14 32,12 30.2,14" fill="#C9A227"/>
  <!-- Bottom point -->
  <polygon points="32,60 33.8,50 32,52 30.2,50" fill="#C9A227"/>
  <!-- Left point -->
  <polygon points="4,32 14,30.2 12,32 14,33.8" fill="#C9A227"/>
  <!-- Right point -->
  <polygon points="60,32 50,30.2 52,32 50,33.8" fill="#C9A227"/>

  <!-- Shield body (navy) -->
  <path d="M32 10 L46 17 L46 34 C46 43 40 50 32 53 C24 50 18 43 18 34 L18 17 Z" fill="#003F7A"/>

  <!-- Shield inner highlight (slightly lighter navy) -->
  <path d="M32 13 L43 19 L43 34 C43 41 38 47 32 50 C26 47 21 41 21 34 L21 19 Z" fill="#004B8A"/>

  <!-- Globe circle on shield (lighter blue) -->
  <circle cx="32" cy="31" r="9" fill="#2166B2" stroke="#C9A227" stroke-width="0.8"/>
  <!-- Globe latitude line -->
  <ellipse cx="32" cy="31" rx="9" ry="4" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.7"/>
  <!-- Globe vertical center line -->
  <line x1="32" y1="22" x2="32" y2="40" stroke="#ffffff" stroke-width="0.6" opacity="0.7"/>

  <!-- Gold laurel left sprig (simplified) -->
  <path d="M22 43 Q21 41 22 39 Q23 40 22 42 Q21 40 20 40 Q21 42 22 43Z" fill="#C9A227"/>
  <path d="M21 42 Q19 40 20 38 Q21 39 20 41 Q19.5 39 18.5 39 Q19.5 41 21 42Z" fill="#C9A227"/>

  <!-- Gold laurel right sprig (simplified) -->
  <path d="M42 43 Q43 41 42 39 Q41 40 42 42 Q43 40 44 40 Q43 42 42 43Z" fill="#C9A227"/>
  <path d="M43 42 Q45 40 44 38 Q43 39 44 41 Q44.5 39 45.5 39 Q44.5 41 43 42Z" fill="#C9A227"/>

  <!-- "IUCB" text -->
  <text x="32" y="57" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#003F7A" text-anchor="middle" letter-spacing="1">IUCB</text>
</svg>
